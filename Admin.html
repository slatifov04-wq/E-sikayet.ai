<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCLuP2m9d-dCTEV5JNfVVkptWzdhYQ0Dss",
authDomain: "e-sikayet-ai.firebaseapp.com",
projectId: "e-sikayet-ai",
storageBucket: "e-sikayet-ai.firebasestorage.app",
messagingSenderId: "499728034558",
appId: "1:499728034558:web:6a0b0468489fadf67d13af"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadComplaints(){

const snap = await getDocs(
collection(db,"complaints")
);

let html="";

snap.forEach(doc=>{

const d = doc.data();

html += `
<div style="
background:white;
padding:15px;
margin:10px;
border-radius:10px;
">
<h3>${d.id}</h3>
<p><b>Ad:</b> ${d.fullname}</p>
<p><b>Şikayət:</b> ${d.complaint}</p>
<p><b>Prioritet:</b> ${d.priority}</p>
<p><b>Tarix:</b> ${d.date}</p>
</div>
`;

});

document.getElementById("list").innerHTML = html;

}

window.onload = loadComplaints;

</script>

<style>

body{
background:#f4f6f9;
font-family:Arial;
}

h1{
text-align:center;
}

</style>

</head>

<body>

<h1>Admin Panel</h1>

<div id="list"></div>

</body>
</html>
