
<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>E-Şikayət AI</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<header>
<h1>🤖 E-Şikayət AI</h1>
<p>Azərbaycan üçün AI əsaslı müraciət platforması</p>
</header>

<div class="container">

<div class="card">

<h2>Yeni Müraciət</h2>

<input
id="fullname"
type="text"
placeholder="Ad Soyad">

<select id="institution">

<option value="">Qurum seçin</option>

<option>Azərsu</option>
<option>Azərişıq</option>
<option>Azəriqaz</option>
<option>DİN</option>
<option>Təhsil Nazirliyi</option>
<option>Səhiyyə Nazirliyi</option>
<option>ƏƏSMN</option>
<option>Kapital Bank</option>
<option>ABB</option>
<option>Unibank</option>
<option>AccessBank</option>
<option>Pasha Bank</option>
<option>BakıBus</option>
<option>Bakı Metropoliteni</option>
<option>İnternet Provayderi</option>
<option>Dövlət Vergi Xidməti</option>
<option>ASAN Xidmət</option>
<option>İcbari Tibbi Sığorta</option>
<option>Aztelekom</option>
<option>Bakcell</option>
<option>Azercell</option>
<option>Nar</option>

</select>

<textarea
id="complaint"
rows="6"
placeholder="Probleminizi yazın..."></textarea>

<button onclick="createComplaint()">
Şikayət Hazırla
</button>

<div id="result"></div>

</div>

<div class="card">

<h2>📊 Statistika</h2>

<div class="stats">

<div class="stat-box">
<span id="totalCount">0</span>
<p>Müraciət</p>
</div>

<div class="stat-box">
<span id="acceptedCount">0</span>
<p>Qəbul</p>
</div>

</div>

</div>

<div class="card">

<h2>🔍 Axtarış</h2>

<input
id="searchInput"
placeholder="Şikayət axtar..."
onkeyup="searchComplaints()">

</div>

<div class="card">

<h2>📂 Müraciətlərim</h2>

<div id="history"></div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
