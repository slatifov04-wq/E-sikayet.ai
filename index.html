<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Şikayət AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
}

header{
background:#2563eb;
color:white;
padding:25px;
text-align:center;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
margin-bottom:20px;
}

input,textarea,select{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:10px;
border:1px solid #ddd;
border-radius:10px;
}

button{
width:100%;
padding:14px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:10px;
}

.result{
background:#eef4ff;
padding:15px;
border-radius:10px;
margin-top:15px;
white-space:pre-wrap;
}

.complaint-card{
background:#fafafa;
padding:15px;
border-left:5px solid #2563eb;
border-radius:10px;
margin-top:10px;
}

.badge{
display:inline-block;
padding:4px 10px;
border-radius:20px;
background:#2563eb;
color:white;
font-size:12px;
margin-top:5px;
}
</style>
</head>

<body>

<header>
<h1>🤖 E-Şikayət AI</h1>
<p>Şikayətinizi rəsmi müraciətə çevirin</p>
</header>

<div class="container">

<div class="card">

<h2>Yeni Şikayət</h2>

<input id="fullname" placeholder="Ad Soyad">

<textarea
id="complaint"
rows="6"
placeholder="Probleminizi yazın">
</textarea>

<select id="urgency">
<option>Normal</option>
<option>Təcili</option>
</select>

<button onclick="createComplaint()">
Şikayət Göndər
</button>

<div id="result" class="result"></div>

</div>

<div class="card">
<h2>📊 Statistika</h2>

<p id="totalCount">
Ümumi müraciət: 0
</p>

<p id="highPriorityCount">
Yüksək prioritet: 0
</p>

</div>

<div class="card">

<h2>Müraciətlər</h2>

<div id="history"></div>

</div>

</div>

<script>

function generateID(){
return "ES-" +
Math.floor(
100000 + Math.random()*900000
);
}

function detectPriority(text){

text=text.toLowerCase();

if(
text.includes("təcili") ||
text.includes("təcili")
){
return "Yüksək";
}

return "Normal";
}

async function createComplaint(){

const fullname =
document.getElementById("fullname").value;

const complaint =
document.getElementById("complaint").value;

if(!fullname || !complaint){
alert("Bütün sahələri doldurun");
return;
}

const id =
generateID();

const priority =
detectPriority(complaint);

const result =

`Şikayət ID: ${id}

Status: Qəbul edildi

Ad Soyad:
${fullname}

Şikayət:

${complaint}`;

document.getElementById("result").innerText =
result;

await saveComplaintToFirebase({
id,
fullname,
complaint,
priority,
date:new Date().toLocaleString()
});

loadHistory();
updateStats();

}
function loadHistory(){

const history =
document.getElementById("history");

history.innerHTML = "";

const data =
JSON.parse(
localStorage.getItem("complaints")
|| "[]"
);

data.forEach(item=>{

history.innerHTML += `

<div class="complaint-card">

<b>${item.id}</b>

<br>

${item.fullname}

<br>

<span class="badge">
${item.priority}
</span>

<br><br>

${item.complaint}

<br><br>

<small>${item.date}</small>

</div>

`;

});

}

function updateStats(){

const data =
JSON.parse(
localStorage.getItem("complaints")
|| "[]"
);

document.getElementById("totalCount").innerText =
"Ümumi müraciət: " + data.length;

const high =
data.filter(
x=>x.priority==="Yüksək"
).length;

document.getElementById("highPriorityCount").innerText =
"Yüksək prioritet: " + high;

}

loadHistory();
updateStats();

</script>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";

import {
getFirestore,
collection,
addDoc
}
from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyCLuP2m9d-dCTEV5JNfVVkptWzdhYQ0Dss",

authDomain: "e-sikayet-ai.firebaseapp.com",

projectId: "e-sikayet-ai",

storageBucket: "e-sikayet-ai.firebasestorage.app",

messagingSenderId: "499728034558",

appId: "1:499728034558:web:6a0b0468489fadf67d13af"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

window.saveComplaintToFirebase =
async function(data){

try{

await addDoc(
collection(db,"complaints"),
data
);

let local =
JSON.parse(
localStorage.getItem("complaints")
|| "[]"
);

local.unshift(data);
if(window.saveComplaintToFirebase){
    await window.saveComplaintToFirebase(data);
}

localStorage.setItem(
"complaints",
JSON.stringify(local)
);

}catch(error){

console.error(error);

}

}

</script>

</body>
</html>
