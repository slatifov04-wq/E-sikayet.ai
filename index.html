<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-≈ûikay…ôt AI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
}

header{
background:#2563eb;
color:white;
padding:25px;
text-align:center;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
margin-bottom:20px;
}

input,textarea,select{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:10px;
border:1px solid #ddd;
border-radius:10px;
}

button{
width:100%;
padding:14px;
background:#2563eb;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:10px;
}

.result{
background:#eef4ff;
padding:15px;
border-radius:10px;
margin-top:15px;
white-space:pre-wrap;
}

.complaint-card{
background:#fafafa;
padding:15px;
border-left:5px solid #2563eb;
border-radius:10px;
margin-top:10px;
}

.badge{
display:inline-block;
padding:4px 10px;
border-radius:20px;
background:#2563eb;
color:white;
font-size:12px;
margin-top:5px;
}
</style>
</head>

<body>

<header>
<h1>πüΛ• E-≈ûikay…ôt AI</h1>
<p>≈ûikay…ôtinizi r…ôsmi mΟΦraci…ôt…ô Οßevirin</p>
</header>

<div class="container">

<div class="card">
<h2>Yeni ≈ûikay…ôt</h2>
<input id="fullname" placeholder="Ad Soyad">
<textarea id="complaint" rows="6" placeholder="Probleminizi yazΡ±n"></textarea>

<select id="urgency">
<option>Normal</option>
<option>T…ôcili</option>
</select>

<button id="submitBtn">≈ûikay…ôt GΟΕnd…ôr</button>
<div id="result" class="result"></div>
</div>

<div class="card">
<h2>πü™ä Statistika</h2>
<p id="totalCount">Ο€mumi mΟΦraci…ôt: 0</p>
<p id="highPriorityCount">YΟΦks…ôk prioritet: 0</p>
</div>

<div class="card">
<h2>MΟΦraci…ôtl…ôr</h2>
<div id="history"></div>
</div>

</div>

<!-- Vahid Modul Script (Firebase v…ô Funksiyalar bir yerd…ô) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCLuP2m9d-dCTEV5JNfVVkptWzdhYQ0Dss",
    authDomain: "e-sikayet-ai.firebaseapp.com",
    projectId: "e-sikayet-ai",
    storageBucket: "e-sikayet-ai.firebasestorage.app",
    messagingSenderId: "499728034558",
    appId: "1:499728034558:web:6a0b0468489fadf67d13af"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Qlobal massiv (statistika v…ô render ΟΦΟßΟΦn)
let complaintsData = [];

function generateID(){
    return "ES-" + Math.floor(100000 + Math.random()*900000);
}

function detectPriority(text, urgencySelect){
    const lowerText = text.toLowerCase();
    // H…ôm m…ôtnd…ô "t…ôcili" sΟΕzΟΦ varsa, h…ôm d…ô select menyudan "T…ôcili" seΟßilibs…ô YΟΦks…ôk t…ôyin et
    if(lowerText.includes("t…ôcili") || urgencySelect === "T…ôcili"){
        return "YΟΦks…ôk";
    }
    return "Normal";
}

// ≈ûikay…ôt yaratma funksiyasΡ±
async function createComplaint(){
    const fullname = document.getElementById("fullname").value.trim();
    const complaint = document.getElementById("complaint").value.trim();
    const urgency = document.getElementById("urgency").value;

    if(!fullname || !complaint){
        alert("BΟΦtΟΦn sah…ôl…ôri doldurun");
        return;
    }

    const id = generateID();
    const priority = detectPriority(complaint, urgency);

    const complaintObject = {
        id,
        fullname,
        complaint,
        priority,
        status: "Q…ôbul edildi",
        date: new Date().toLocaleString()
    };

    try {
        // Firebase-…ô yazΡ±rΡ±q
        await addDoc(collection(db, "complaints"), complaintObject);
        
        // Ekranda n…ôtic…ôni gΟΕst…ôririk
        document.getElementById("result").innerText = `≈ûikay…ôt ID: ${id}\nStatus: Q…ôbul edildi\nAd Soyad: ${fullname}\n≈ûikay…ôt:\n${complaint}`;
        
        // Formu t…ômizl…ôyirik
        document.getElementById("fullname").value = "";
        document.getElementById("complaint").value = "";
    } catch(error) {
        console.error("X…ôta ba≈ü verdi: ", error);
        alert("X…ôta: M…ôlumat bazaya yazΡ±la bilm…ôdi.");
    }
}

// M…ôlumatlarΡ± ekrana yazdΡ±rmaq v…ô statistika
function renderData() {
    const history = document.getElementById("history");
    history.innerHTML = "";

    complaintsData.forEach(item => {
        history.innerHTML += `
        <div class="complaint-card">
            <b>${item.id}</b> <span class="badge" style="background:${item.status === 'H…ôll edildi' ? 'green' : (item.status === 'BaxΡ±lΡ±r' ? 'orange' : '#2563eb')}">${item.status || 'Q…ôbul edildi'}</span>
            <br>
            ${item.fullname}
            <br>
            <span class="badge" style="background:${item.priority === 'YΟΦks…ôk' ? 'red' : '#6b7280'}">${item.priority}</span>
            <br><br>
            ${item.complaint}
            <br><br>
            <small>${item.date}</small>
        </div>`;
    });

    // StatistikanΡ±n yenil…ônm…ôsi
    document.getElementById("totalCount").innerText = "Ο€mumi mΟΦraci…ôt: " + complaintsData.length;
    const high = complaintsData.filter(x => x.priority === "YΟΦks…ôk").length;
    document.getElementById("highPriorityCount").innerText = "YΟΦks…ôk prioritet: " + high;
}

// Real-time (canlΡ±) veril…ônl…ôr bazasΡ± dinl…ôyicisi (onSnapshot)
// Bu funksiya h…ôm admin paneld…ôn silin…ôn/d…ôyi≈ü…ôn m…ôlumatlarΡ±, h…ôm d…ô yeni mΟΦraci…ôtl…ôri anΡ±nda yenil…ôyir
onSnapshot(collection(db, "complaints"), (snapshot) => {
    complaintsData = [];
    snapshot.forEach(doc => {
        complaintsData.push(doc.data());
    });
    // Tarix…ô gΟΕr…ô sΡ±ralama (…ôn yeni ΟΦst…ô g…ôlsin)
    complaintsData.sort((a, b) => new Date(b.date) - new Date(a.date));
    renderData();
});

// DΟΦym…ôy…ô klik hadis…ôsini baΡülayΡ±rΡ±q
document.getElementById("submitBtn").addEventListener("click", createComplaint);

</script>

</body>
</html>
